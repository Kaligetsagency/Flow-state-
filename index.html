<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura Flow - Focus Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px 2px rgba(6, 182, 212, 0.4); }
            50% { box-shadow: 0 0 30px 5px rgba(6, 182, 212, 0.8); }
        }
        .btn-glow {
            animation: pulse-glow 3s infinite;
        }
        .stat-value {
            font-family: monospace;
            font-size: 1.25rem;
            color: #22d3ee;
        }
    </style>
</head>
<body class="text-white">

    <!-- Game Canvas -->
    <canvas id="gameCanvas" class="absolute inset-0 w-full h-full z-0"></canvas>

    <!-- Score UI (Top Left) -->
    <div id="hud" class="absolute top-6 left-6 z-10 hidden opacity-0 transition-opacity duration-1000">
        <p class="text-gray-400 tracking-widest text-sm uppercase">Points: <span id="hudPoints" class="text-cyan-400 font-bold text-lg">0</span></p>
        <p class="text-gray-500 tracking-widest text-xs uppercase mt-1">State: <span id="hudState" class="text-purple-400">Warming Up</span></p>
    </div>

    <!-- Start Layer -->
    <div id="uiLayer" class="absolute inset-0 z-20 flex flex-col items-center justify-center bg-black/80 backdrop-blur-sm transition-opacity duration-700">
        <h1 class="text-6xl font-light tracking-[0.3em] mb-2 text-cyan-400 drop-shadow-[0_0_15px_rgba(6,182,212,0.8)]">AURA FLOW</h1>
        <p class="text-gray-400 mb-8 max-w-md text-center text-sm tracking-wider px-4">
            Match the incoming nodes. <br>
            <span class="text-red-400 font-bold uppercase mt-2 block">1 Miss = Game Over.</span><br>
            <span class="text-cyan-300">Desktop:</span> Arrow Keys or W A S D<br>
            <span class="text-cyan-300">Mobile:</span> Swipe Up, Down, Left, or Right
        </p>
        <button id="startBtn" class="px-10 py-3 rounded-full border border-cyan-500 text-cyan-400 tracking-widest uppercase hover:bg-cyan-950 transition-colors duration-300 btn-glow focus:outline-none">
            Enter State
        </button>
    </div>

    <!-- Game Over / Stats Layer -->
    <div id="gameOverLayer" class="absolute inset-0 z-30 hidden flex-col items-center justify-center bg-black/95 backdrop-blur-md">
        <h2 class="text-4xl font-light tracking-[0.2em] text-red-500 mb-2">FOCUS BROKEN</h2>
        <p class="text-gray-400 mb-8 text-sm uppercase tracking-widest">Session Complete</p>
        
        <div class="bg-gray-900/50 border border-gray-800 p-8 rounded-2xl w-full max-w-md shadow-2xl backdrop-blur-lg mb-8">
            <div class="flex justify-between items-center border-b border-gray-800 pb-4 mb-4">
                <span class="text-gray-400 uppercase tracking-wider text-sm">Total Points (Matches)</span>
                <span id="statPoints" class="stat-value text-purple-400 font-bold text-2xl">0</span>
            </div>
            <div class="flex justify-between items-center border-b border-gray-800 pb-4 mb-4">
                <span class="text-gray-400 uppercase tracking-wider text-sm">Total Time Focused</span>
                <span id="statTotalTime" class="stat-value">0s</span>
            </div>
            <div class="flex justify-between items-center border-b border-gray-800 pb-4 mb-4">
                <span class="text-gray-400 uppercase tracking-wider text-sm">Time to Enter Flow</span>
                <span id="statEntryTime" class="stat-value text-yellow-400">N/A</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-gray-400 uppercase tracking-wider text-sm">Duration in Flow State</span>
                <span id="statFlowDuration" class="stat-value text-green-400">0s</span>
            </div>
        </div>

        <button id="restartBtn" class="px-10 py-3 rounded-full border border-gray-500 text-gray-300 tracking-widest uppercase hover:bg-gray-800 hover:text-white transition-colors duration-300 focus:outline-none">
            Restart Session
        </button>
    </div>

    <script>
        /**
         * AUDIO ENGINE
         */
        class AudioEngine {
            constructor() {
                this.ctx = null;
                this.droneGain = null;
                this.scale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25];
            }

            init() {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();

                this.masterGain = this.ctx.createGain();
                this.masterGain.gain.value = 0.6;
                this.masterGain.connect(this.ctx.destination);

                this.droneOsc1 = this.ctx.createOscillator();
                this.droneOsc2 = this.ctx.createOscillator();
                this.droneGain = this.ctx.createGain();

                this.droneOsc1.type = 'sine';
                this.droneOsc2.type = 'sine';
                this.droneOsc1.frequency.value = 136.1;
                this.droneOsc2.frequency.value = 142.1; // 6Hz diff

                const panLeft = this.ctx.createStereoPanner ? this.ctx.createStereoPanner() : this.ctx.createGain();
                const panRight = this.ctx.createStereoPanner ? this.ctx.createStereoPanner() : this.ctx.createGain();
                if (panLeft.pan) { panLeft.pan.value = -1; panRight.pan.value = 1; }

                this.droneOsc1.connect(panLeft);
                this.droneOsc2.connect(panRight);
                panLeft.connect(this.droneGain);
                panRight.connect(this.droneGain);
                this.droneGain.connect(this.masterGain);

                this.droneGain.gain.value = 0;
                this.droneOsc1.start();
                this.droneOsc2.start();
                
                this.droneGain.gain.setTargetAtTime(0.15, this.ctx.currentTime, 2);
            }

            playHitSound(flowMultiplier) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                const noteIndex = Math.min(Math.floor(flowMultiplier * 2), this.scale.length - 1);
                osc.frequency.value = this.scale[noteIndex];
                osc.type = 'sine';

                osc.connect(gain);
                gain.connect(this.masterGain);

                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.3, this.ctx.currentTime + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.8);

                osc.start();
                osc.stop(this.ctx.currentTime + 1);
            }

            playMissSound() {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(30, this.ctx.currentTime + 0.4);
                
                osc.connect(gain);
                gain.connect(this.masterGain);

                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.4);

                osc.start();
                osc.stop(this.ctx.currentTime + 0.5);
                
                // Fade drone out
                this.droneGain.gain.setTargetAtTime(0, this.ctx.currentTime, 0.5);
            }

            updateDrone(flowMultiplier) {
                if (!this.ctx) return;
                const targetVolume = 0.15 + (flowMultiplier * 0.1);
                this.droneGain.gain.setTargetAtTime(targetVolume, this.ctx.currentTime, 0.5);
                this.droneOsc2.frequency.setTargetAtTime(136.1 + 6 + (flowMultiplier * 2), this.ctx.currentTime, 1);
            }
        }

        /**
         * GAME ENGINE & STATE
         */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        let width, height, centerX, centerY;
        let isPlaying = false;
        let animationId;

        // Colors
        const COLORS = {
            bg: '#050505',
            center: '#06b6d4', 
            node: '#a855f7',   
            hit: '#22d3ee',
            miss: '#ef4444'    
        };

        // Strict Tracking Stats
        let points = 0;
        let flowMultiplier = 0;     // 0.0 to 1.0
        let gameStartTime = 0;
        let flowStartTime = null;   // Timestamp when flow state is entered
        const FLOW_THRESHOLD = 0.8; // At 80% multiplier, we consider the user "In Flow"
        
        // DDA Variables
        let baseSpeed = 0;
        let currentSpeed = 0;
        let spawnInterval = 0;
        let lastSpawnTime = 0;
        let hitZoneRadius = 0;

        // Entities
        let nodes = [];
        let particles = [];
        let visualRings = [];

        const audio = new AudioEngine();

        const DIRS = [
            { x: 0, y: -1 }, // Up
            { x: 1, y: 0 },  // Right
            { x: 0, y: 1 },  // Down
            { x: -1, y: 0 }  // Left
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
            
            hitZoneRadius = Math.min(width, height) * 0.1;
            baseSpeed = Math.min(width, height) * 0.0035;
            if(isPlaying) currentSpeed = baseSpeed + (flowMultiplier * baseSpeed * 1.5);
        }
        window.addEventListener('resize', resize);

        class Node {
            constructor() {
                this.dirIndex = Math.floor(Math.random() * 4);
                this.dir = DIRS[this.dirIndex];
                
                const spawnDist = Math.max(width, height) * 0.8;
                this.x = centerX + (this.dir.x * spawnDist);
                this.y = centerY + (this.dir.y * spawnDist);
                
                this.radius = hitZoneRadius * 0.3;
                this.active = true;
                
                this.targetX = centerX;
                this.targetY = centerY;
            }

            update(speed) {
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist > speed) {
                    this.x += (dx / dist) * speed;
                    this.y += (dy / dist) * speed;
                } else {
                    this.x = this.targetX;
                    this.y = this.targetY;
                }

                if (dist < hitZoneRadius * 0.2 && this.active) {
                    this.active = false;
                    triggerGameOver();
                }
            }

            draw(ctx) {
                if (!this.active) return;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = COLORS.node;
                ctx.shadowBlur = 15;
                ctx.shadowColor = COLORS.node;
                ctx.fill();
                ctx.shadowBlur = 0; 
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 5 + 3;
                this.vx = Math.cos(angle) * velocity;
                this.vy = Math.sin(angle) * velocity;
                this.life = 1.0;
                this.decay = Math.random() * 0.02 + 0.015;
                this.size = Math.random() * 5 + 2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        class VisualRing {
            constructor() {
                this.radius = hitZoneRadius;
                this.life = 1.0;
            }
            update() {
                this.radius += 3;
                this.life -= 0.04;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.strokeStyle = COLORS.hit;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(centerX, centerY, this.radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1.0;
            }
        }

        function handleInput(dirIndex) {
            if (!isPlaying) return;

            let hit = false;
            let targetNode = null;
            let minDist = Infinity;

            for (let node of nodes) {
                if (node.active && node.dirIndex === dirIndex) {
                    const dist = Math.sqrt(Math.pow(node.x - centerX, 2) + Math.pow(node.y - centerY, 2));
                    if (dist < minDist) {
                        minDist = dist;
                        targetNode = node;
                    }
                }
            }

            const tolerance = hitZoneRadius * 1.5; 
            
            if (targetNode && minDist <= tolerance) {
                // Perfect hit
                targetNode.active = false;
                handleHit(targetNode.x, targetNode.y);
            } else {
                // Tapped but missed the timing or wrong direction
                triggerGameOver();
            }
        }

        function handleHit(x, y) {
            points++;
            document.getElementById('hudPoints').innerText = points;

            // Increase difficulty
            flowMultiplier = Math.min(1.0, flowMultiplier + 0.04);
            currentSpeed = baseSpeed + (flowMultiplier * baseSpeed * 1.5);
            spawnInterval = Math.max(500, 2200 - (flowMultiplier * 1700)); 

            // Track Flow State Entry
            if (flowMultiplier >= FLOW_THRESHOLD && flowStartTime === null) {
                flowStartTime = performance.now();
                document.getElementById('hudState').innerText = "FLOW STATE ACHIEVED";
                document.getElementById('hudState').classList.replace('text-purple-400', 'text-green-400');
                document.getElementById('hudState').classList.add('font-bold', 'animate-pulse');
            }
            
            // Visuals
            for (let i = 0; i < 15; i++) particles.push(new Particle(x, y, COLORS.hit));
            visualRings.push(new VisualRing());
            audio.playHitSound(flowMultiplier);
            audio.updateDrone(flowMultiplier);
            
            ctx.fillStyle = 'rgba(6, 182, 212, 0.15)';
            ctx.fillRect(0, 0, width, height);
        }

        function formatTime(ms) {
            let totalSeconds = Math.floor(ms / 1000);
            let minutes = Math.floor(totalSeconds / 60);
            let seconds = totalSeconds % 60;
            if (minutes > 0) return `${minutes}m ${seconds}s`;
            return `${seconds}s`;
        }

        function triggerGameOver() {
            if (!isPlaying) return;
            isPlaying = false;
            
            let endTime = performance.now();
            let totalFocusMs = endTime - gameStartTime;
            
            // Stats Calculations
            let timeToFlowStr = "Did not reach flow";
            let timeInFlowStr = "0s";
            
            if (flowStartTime !== null) {
                let timeToFlowMs = flowStartTime - gameStartTime;
                let timeInFlowMs = endTime - flowStartTime;
                timeToFlowStr = formatTime(timeToFlowMs);
                timeInFlowStr = formatTime(timeInFlowMs);
            }

            // Populate End Screen Stats
            document.getElementById('statPoints').innerText = points;
            document.getElementById('statTotalTime').innerText = formatTime(totalFocusMs);
            document.getElementById('statEntryTime').innerText = timeToFlowStr;
            document.getElementById('statFlowDuration').innerText = timeInFlowStr;

            // Visuals
            for (let i = 0; i < 30; i++) particles.push(new Particle(centerX, centerY, COLORS.miss));
            audio.playMissSound();

            ctx.fillStyle = 'rgba(239, 68, 68, 0.3)';
            ctx.fillRect(0, 0, width, height);
            
            canvas.style.transform = `translate(${Math.random()*15-7.5}px, ${Math.random()*15-7.5}px)`;
            setTimeout(() => { canvas.style.transform = 'translate(0,0)'; }, 50);

            // Hide HUD, Show Game Over
            document.getElementById('hud').classList.remove('opacity-100');
            document.getElementById('hud').classList.add('opacity-0');
            
            setTimeout(() => {
                cancelAnimationFrame(animationId);
                document.getElementById('gameOverLayer').classList.remove('hidden');
                document.getElementById('gameOverLayer').classList.add('flex');
            }, 500);
        }

        function startGame() {
            document.getElementById('uiLayer').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('gameOverLayer').classList.add('hidden');
            document.getElementById('gameOverLayer').classList.remove('flex');
            
            // Show HUD
            const hud = document.getElementById('hud');
            hud.classList.remove('hidden');
            setTimeout(() => { hud.classList.remove('opacity-0'); hud.classList.add('opacity-100'); }, 100);

            if (!audio.ctx) audio.init();
            
            resize(); 
            
            // Reset Stats & State
            nodes = [];
            particles = [];
            visualRings = [];
            points = 0;
            flowMultiplier = 0;
            spawnInterval = 2200;
            currentSpeed = baseSpeed;
            flowStartTime = null;
            gameStartTime = performance.now();
            lastSpawnTime = gameStartTime;
            
            // Reset HUD strings
            document.getElementById('hudPoints').innerText = "0";
            document.getElementById('hudState').innerText = "Warming Up";
            document.getElementById('hudState').className = "text-purple-400";
            
            isPlaying = true;
            animationId = requestAnimationFrame(gameLoop);

            // Ensure drone is back on
            if(audio.droneGain) {
                audio.droneGain.gain.setTargetAtTime(0.15, audio.ctx.currentTime, 1);
            }
        }

        function gameLoop(timestamp) {
            if (!isPlaying) {
                // If game over, just draw particles fading out
                ctx.fillStyle = `rgba(5, 5, 5, 1)`; 
                ctx.fillRect(0, 0, width, height);
                for (let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i];
                    p.update();
